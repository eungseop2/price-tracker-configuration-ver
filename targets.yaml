    required_keywords:
    - S26
    - 울트라
    - 화이트
    exclude_keywords:
    - 중고
    - 리퍼
    - 케이스
    - 커버
    - 필름
    product_id: '59045494153'
    allowed_product_types:
    - 1
    - 3
