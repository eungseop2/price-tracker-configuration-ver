common:
  exclude: used:cbshop
  display: 50
  timeout_seconds: 20
  ranking_limit: 100
  monitored_sellers:
    - 삼성공식파트너 위드모바일
    - 삼성전자공식파트너 쇼마젠시
    - 삼성모바일파트너 코잇
    - 삼성인증파트너 케이원정보

targets:
- name: S26 울트라 티타늄 화이트 512GB (최저가)
  mode: api_query
  query: '갤럭시 S26 울트라 티타늄 화이트 512GB'
  rank_query: '갤럭시 S26 울트라'
  category: S26
  request:
    pages: 1
    sort: sim
    filter: null
  match:
    required_keywords: ["S26", "울트라", "화이트"]
    exclude_keywords: ["중고", "리퍼", "케이스", "커버", "필름"]
    product_id: '[숫자_ID]'
    allowed_product_types: [1, 3]
  url: https://search.shopping.naver.com/catalog/[숫자_ID]
  browser:
    wait_until: domcontentloaded
    click_selectors: []
    price_selector: "[class^='style_price_num']"
    seller_selector: "[class^='style_mall_name']"
    offer_row_selector: "li[class^='style_seller_item']"

