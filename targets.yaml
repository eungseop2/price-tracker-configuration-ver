common:
  exclude: used:cbshop
  display: 50
  timeout_seconds: 20
targets:
- name: S26 울트라 화이트 512GB
  mode: api_query
  query: '갤럭시 S26 울트라 화이트 512GB'
  rank_query: '갤럭시 S26 울트라'
  category: 폰
  request:
    pages: 1
    sort: sim
    filter: null
  match:
    required_keywords:
    - S26
    - 울트라
    - 화이트
    exclude_keywords:
    - 중고
    - 리퍼
    - 케이스
    - 커버
    - 필름
    product_id: '59045494153'
    allowed_product_types:
    - 1
    - 3
  url: https://search.shopping.naver.com/catalog/59045494153
  browser:
    wait_until: domcontentloaded
    click_selectors: []
    price_selector: "[class^='style_price_num']"
    seller_selector: "[class^='style_mall_name']"
    offer_row_selector: "li[class^='style_seller_item']"

