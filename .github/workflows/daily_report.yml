name: Daily Price Tracker Report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # KST 기준 매일 오전 8시 실행 (UTC 23:00)
    - cron: '0 23 * * *'
  # GitHub 웹사이트에서 수동으로도 실행 가능하게 버튼 추가
  workflow_dispatch: 

jobs:
  run-tracker-and-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 구글 스프레드시트 데이터 수집
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          # 1. 이번 회차 데이터 수집 및 구글 시트 업데이트
          python -m src.tracker.main once --verbose
          
          # 2. 구글 시트 데이터를 기반으로 대시보드 JSON 추출
          python -m src.tracker.main export-ui

      - name: 대시보드 데이터 커밋 및 푸쉬
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dashboard_data.json
          git commit -m "📊 Update: Dashboard data updated from Google Sheets [skip ci]" || echo "변경 사항 없음"
          git push origin ${GITHUB_REF##*/}

      - name: 일단위 메일 리포트 발송
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          python -m src.tracker.main daily-report || echo "메일 발송 기능을 준비 중입니다."

      - name: 결과물(대시보드 파일) 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-data
          path: |
            dashboard_data.json
          retention-days: 7
