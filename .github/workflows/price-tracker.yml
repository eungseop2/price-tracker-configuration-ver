name: Naver Price Tracker (Automated)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '21 */2 * * *'  # Every 2 hours at minute 21
  workflow_dispatch:      # Manual trigger from GitHub UI (Refresh Now)
  push:
    branches: [ main ]    # Run on every push to main

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To allow pushing updates if needed
    env:
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GSHEET_ID: ${{ secrets.GSHEET_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      PYTHONPATH: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          # Playwright 및 브라우저 의존성 설치 최적화
          sudo apt-get update
          # 멈춤 현상을 방지하기 위해 의존성 설치와 브라우저 설치를 분리하고 명시적 명령어 사용
          npx playwright install-deps chromium
          npx playwright install chromium


      - name: Run Price Tracker
        run: |
          # 1. Collect Prices (Strict failure reporting)
          python -m tracker.main once --summary-json summary.json
          
          if [ -f "summary.json" ]; then
            echo "### 📊 Collection Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat summary.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Export and Package UI
        if: always() # Run even if collection partially failed
        run: |
          export PYTHONPATH=src
          # 3. Export Dashboard UI
          python -m tracker.main export-ui
          
          # Prepare public directory for GitHub Pages (Security: only expose UI files)
          mkdir -p public
          if [ -f "dashboard.html" ]; then
            cp dashboard.html public/index.html
            cp dashboard.html public/dashboard.html
          else
            echo "No dashboard.html found"
          fi
          [ -f "dashboard_data.json" ] && cp dashboard_data.json public/ || echo "No dashboard_data.json found"
          [ -f "dashboard.css" ] && cp dashboard.css public/ || echo "No dashboard.css found"
          [ -f "dashboard.js" ] && cp dashboard.js public/ || echo "No dashboard.js found"
          [ -f "logo.png" ] && cp logo.png public/ || echo "No logo.png found"


      - name: Commit and Push Changes (Data Accumulation)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "📊 Update dashboard data [skip ci]"
            # 동시성 문제 해결을 위해 push 전 최신 코드 pull(rebase) 수행
            # 충돌 발생 시 Action이 새로 수집한 데이터를 우선시(-X theirs)
            git stash
            git pull --rebase -X theirs origin main
            git push || (sleep 10 && git pull --rebase -X theirs origin main && git push)
            git stash pop || echo "Nothing to pop"
          fi

      - name: Upload Debug Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: artifacts/
          retention-days: 3

      - name: Upload Dashboard to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # Only expose the public assets

  deploy:
    needs: track
    runs-on: ubuntu-latest
    if: always() # 수집 실패와 무관하게 항상 업로드 시도
    permissions:
      pages: write
      id-token: write
      contents: write # 추가: 커밋을 위해 필요할 수 있음 (이미 상단에 정의됨)
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
