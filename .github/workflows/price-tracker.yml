name: Naver Price Tracker (Automated)

on:
  schedule:
    - cron: '21 */2 * * *'  # Every 2 hours at minute 21
  workflow_dispatch:      # Manual trigger from GitHub UI (Refresh Now)
  push:
    branches: [ main ]    # Run on every push to main

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To allow pushing updates if needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Price Tracker
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          PYTHONPATH: src
        run: |
          # 1. 이번 회차 데이터 수집 및 구글 시트 업데이트
          python -m tracker.main once --verbose --summary-json summary.json
          
          if [ -f "summary.json" ]; then
            echo "### 📊 Collection Summary" >> $GITHUB_STEP_SUMMARY
            echo "```json" >> $GITHUB_STEP_SUMMARY
            cat summary.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Export and Package UI
        if: always() # Run even if collection partially failed
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          PYTHONPATH: src
        run: |
          # 2. 구글 시트 데이터를 기반으로 대시보드 JSON 추출
          python -m tracker.main export-ui
          
          # Prepare public directory for GitHub Pages (Security: only expose UI files)
          mkdir -p public
          if [ -f "dashboard.html" ]; then
            cp dashboard.html public/index.html
            cp dashboard.html public/dashboard.html
          fi
          [ -f "dashboard_data.json" ] && cp dashboard_data.json public/ || echo "No dashboard_data.json found"
          [ -f "logo.png" ] && cp logo.png public/ || echo "No logo.png found"

      - name: Commit and Push Changes (Data Accumulation)
        if: always()
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "📊 Update: Dashboard data updated from Google Sheets [skip ci]"
            git push origin ${GITHUB_REF##*/}
          fi

      - name: Upload Debug Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: artifacts/
          retention-days: 3

      - name: Upload Dashboard to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # Only expose the public assets

  deploy:
    needs: track
    runs-on: ubuntu-latest
    if: always() # 테스트 웹 화면 확인을 위해 브랜치 검사 해제, 항시 배포
    permissions:
      pages: write
      id-token: write
      contents: write # 추가: 커밋을 위해 필요할 수 있음 (이미 상단에 정의됨)
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
